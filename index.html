<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tax Document Assistant</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #f5f3ff;
  --card:        #ffffff;
  --border:      #e2e8f0;
  --primary:     #4f46e5;
  --primary-lt:  #ede9fe;
  --text:        #1e293b;
  --muted:       #64748b;
  --tool-bg:     #fffbeb;
  --tool-border: #f59e0b;
  --tool-text:   #92400e;
  --green:       #059669;
  --red-bg:      #fef2f2;
  --red-border:  #fca5a5;
  --red-text:    #991b1b;
  --r:           14px;
  --r-sm:        8px;
  --shadow:      0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(79,70,229,.08);
  --shadow-h:    0 8px 24px rgba(79,70,229,.16), 0 2px 6px rgba(0,0,0,.08);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0 16px 100px;
  overflow-x: hidden;
}

#app { max-width: 720px; margin: 0 auto; }

/* ── Header ── */
header {
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #1e1b4b 0%, #3730a3 40%, #4f46e5 70%, #7c3aed 100%);
  border-radius: 0 0 28px 28px;
  margin: 0 -16px 36px;
  padding: 56px 32px 48px;
  text-align: center;
}

/* Glow blob — top left */
header::before {
  content: '';
  position: absolute;
  width: 380px; height: 380px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(129,140,248,.7) 0%, transparent 65%);
  top: -160px; left: -100px;
  pointer-events: none;
}

/* Glow blob — bottom right */
header::after {
  content: '';
  position: absolute;
  width: 300px; height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(167,139,250,.65) 0%, transparent 65%);
  bottom: -110px; right: -70px;
  pointer-events: none;
}

header h1 {
  position: relative;
  z-index: 1;
  font-size: 2rem;
  font-weight: 800;
  letter-spacing: -.03em;
  color: #ffffff;
  margin-bottom: 8px;
  text-shadow: 0 2px 16px rgba(0,0,0,.25);
}

header p {
  position: relative;
  z-index: 1;
  color: rgba(255,255,255,.78);
  font-size: .92rem;
}

/* ── Shared card pattern: colored top stripe via inset box-shadow ── */

/* ── Upload zone ── */
#drop-zone {
  border: 2px dashed #c4b5fd;
  border-radius: var(--r);
  padding: 40px 24px;
  text-align: center;
  cursor: pointer;
  background: var(--card);
  transition: border-color .2s, background .2s, transform .2s, box-shadow .2s;
  user-select: none;
  box-shadow: var(--shadow), inset 0 4px 0 #f59e0b;
}
#drop-zone:hover, #drop-zone.drag-over {
  border-color: var(--primary);
  background: var(--primary-lt);
  transform: translateY(-3px);
  box-shadow: var(--shadow-h), inset 0 4px 0 #f59e0b;
}
#drop-zone.done {
  border: 2px solid #86efac;
  background: #f0fdf4;
  cursor: pointer;
  box-shadow: var(--shadow), inset 0 4px 0 #10b981;
}
#drop-zone.done:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-h), inset 0 4px 0 #10b981;
}
.upload-icon { font-size: 2.5rem; margin-bottom: 12px; }
#drop-zone p  { color: var(--muted); margin-bottom: 4px; font-size: .9rem; }
#drop-zone .hint { font-size: .78rem; color: #94a3b8; margin-top: 4px; }
#drop-zone strong { color: var(--primary); }

#upload-status {
  margin-top: 10px;
  font-size: .85rem;
  color: var(--muted);
  text-align: center;
  min-height: 20px;
}

/* ── Animations ── */
.hidden { display: none !important; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Extraction panel ── */
#extraction-section { margin-top: 20px; }

#extraction-section:not(.hidden) {
  animation: fadeInUp .38s cubic-bezier(.22,.68,0,1.2) both;
}

#extraction-panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px 24px;
  box-shadow: var(--shadow), inset 0 4px 0 #3b82f6;
  transition: transform .2s, box-shadow .2s;
}
#extraction-panel:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-h), inset 0 4px 0 #3b82f6;
}

.panel-header {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
  font-size: .875rem;
  margin-bottom: 10px;
  color: var(--text);
}
#extraction-content {
  font-size: .85rem;
  line-height: 1.75;
  color: var(--text);
  white-space: pre-wrap;
}

/* ── Chat ── */
#chat-section { margin-top: 24px; }

#chat-section:not(.hidden) {
  animation: fadeInUp .38s cubic-bezier(.22,.68,0,1.2) both;
}

#messages {
  display: flex;
  flex-direction: column;
  gap: 18px;
  margin-bottom: 16px;
}

.msg-row {
  display: flex;
  flex-direction: column;
  animation: fadeInUp .24s ease both;
}
.msg-row.user      { align-items: flex-end; }
.msg-row.assistant { align-items: flex-start; }

.msg-role {
  font-size: .68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--muted);
  margin-bottom: 5px;
  padding: 0 4px;
}

.msg-bubble {
  max-width: 88%;
  padding: 12px 16px;
  border-radius: var(--r);
  font-size: .9rem;
  line-height: 1.65;
  white-space: pre-wrap;
}
.msg-row.user .msg-bubble {
  background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
  color: #fff;
  border-bottom-right-radius: 4px;
  box-shadow: 0 2px 10px rgba(79,70,229,.35);
}
.msg-row.assistant .msg-bubble {
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--text);
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}

/* ── Tool chips ── */
.tool-chips {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 6px;
  max-width: 88%;
}

.tool-chip {
  background: var(--tool-bg);
  border: 1px solid var(--tool-border);
  border-radius: var(--r-sm);
  padding: 7px 11px;
  font-size: .76rem;
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  color: var(--tool-text);
  cursor: pointer;
  user-select: none;
  transition: transform .15s, box-shadow .15s;
}
.tool-chip:hover {
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(245,158,11,.3);
}

.chip-summary {
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 4px;
}
.chip-name   { font-weight: 700; }
.chip-args   { color: #b45309; }
.chip-arrow  { color: #d97706; font-weight: 600; }
.chip-result { color: #92400e; }
.chip-toggle { margin-left: auto; font-size: .68rem; color: #d97706; flex-shrink: 0; }

.chip-details {
  display: none;
  margin-top: 7px;
  padding-top: 7px;
  border-top: 1px solid #fde68a;
}
.tool-chip.open .chip-details { display: block; }

.detail-row {
  display: flex;
  gap: 6px;
  margin-bottom: 4px;
  flex-wrap: wrap;
}
.detail-label { color: #d97706; font-weight: 700; flex-shrink: 0; }
.detail-val   { color: var(--tool-text); word-break: break-all; }

/* ── Thinking dots ── */
.thinking {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  font-size: .85rem;
  padding: 6px 2px;
}
.dots span {
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--primary);
  animation: bounce .9s infinite;
}
.dots span:nth-child(2) { animation-delay: .15s; }
.dots span:nth-child(3) { animation-delay: .30s; }
@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: .4; }
  40%           { transform: translateY(-5px); opacity: 1; }
}

/* ── Input bar ── */
#input-row {
  display: flex;
  gap: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 8px;
  box-shadow: var(--shadow), inset 0 4px 0 #10b981;
}
#msg-input {
  flex: 1;
  border: none;
  outline: none;
  font-size: .9rem;
  background: transparent;
  color: var(--text);
  padding: 4px 8px;
}
#msg-input::placeholder { color: #94a3b8; }
#msg-input:disabled     { cursor: not-allowed; }

#send-btn {
  background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 20px;
  font-size: .875rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s, transform .15s, box-shadow .15s;
  box-shadow: 0 2px 10px rgba(79,70,229,.4);
  white-space: nowrap;
}
#send-btn:hover:not(:disabled) {
  opacity: .92;
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(79,70,229,.5);
}
#send-btn:disabled {
  background: #94a3b8;
  box-shadow: none;
  cursor: not-allowed;
  transform: none;
}

/* ── Error ── */
.error-banner {
  background: var(--red-bg);
  border: 1px solid var(--red-border);
  color: var(--red-text);
  border-radius: var(--r-sm);
  padding: 10px 14px;
  font-size: .85rem;
}

/* ── Mobile ── */
@media (max-width: 500px) {
  header { padding: 44px 20px 38px; border-radius: 0 0 20px 20px; }
  header h1 { font-size: 1.5rem; }
  .msg-bubble { max-width: 96%; }
  #send-btn { padding: 8px 14px; font-size: .8rem; }
}
</style>
</head>
<body>
<div id="app">

  <header>
    <h1>🇪🇸 Tax Document Assistant</h1>
    <p>Upload a Spanish tax document (invoice, payslip, tax certificate) and ask questions about it.</p>
  </header>

  <!-- Upload -->
  <section id="upload-section">
    <div id="drop-zone"
         ondragover="onDragOver(event)"
         ondragleave="onDragLeave(event)"
         ondrop="onDrop(event)"
         onclick="document.getElementById('file-input').click()">
      <div class="upload-icon">📄</div>
      <p>Drop a PDF or image here, or <strong>click to upload</strong></p>
      <p class="hint">PDF · JPEG · PNG · WebP · max 10 MB</p>
      <input type="file" id="file-input"
             accept=".pdf,image/jpeg,image/png,image/webp"
             style="display:none"
             onchange="onFileSelect(event)">
    </div>
    <div id="upload-status"></div>
  </section>

  <!-- Extraction panel -->
  <section id="extraction-section" class="hidden">
    <div id="extraction-panel">
      <div class="panel-header">
        <span>✅</span>
        <span id="doc-filename"></span>
      </div>
      <div id="extraction-content"></div>
    </div>
  </section>

  <!-- Chat -->
  <section id="chat-section" class="hidden">
    <div id="messages"></div>
    <div id="input-row">
      <input type="text" id="msg-input"
             placeholder="Haz una pregunta sobre el documento…"
             disabled
             onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}">
      <button id="send-btn" onclick="sendMessage()" disabled>Enviar →</button>
    </div>
  </section>

</div>
<script>
// ─── State ───────────────────────────────────────────────────────────────────
const S = { history: [] };  // [{role, content}] text-only turns

// ─── Drag & Drop ─────────────────────────────────────────────────────────────
function onDragOver(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.add('drag-over');
}
function onDragLeave() {
  document.getElementById('drop-zone').classList.remove('drag-over');
}
function onDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  const f = e.dataTransfer?.files?.[0];
  if (f) uploadFile(f);
}
function onFileSelect(e) {
  const f = e.target.files?.[0];
  if (f) uploadFile(f);
  // reset so same file can be re-selected
  e.target.value = '';
}

// ─── Upload ───────────────────────────────────────────────────────────────────
async function uploadFile(file) {
  const status = document.getElementById('upload-status');
  const zone   = document.getElementById('drop-zone');
  status.textContent = '⏳ Uploading and analysing…';
  zone.classList.remove('done');

  const fd = new FormData();
  fd.append('file', file);

  try {
    const res  = await fetch('/upload', { method: 'POST', body: fd });
    const data = await res.json();

    if (!res.ok) {
      status.innerHTML = `<span class="error-banner">❌ ${esc(data.detail || 'Upload failed')}</span>`;
      return;
    }

    // Update drop zone to "done" state
    status.textContent = '';
    zone.classList.add('done');
    zone.onclick = null;
    zone.ondragover = null;
    zone.ondrop = null;
    zone.querySelector('.upload-icon').textContent = '✅';
    zone.querySelector('p').textContent = file.name;
    zone.querySelector('.hint').textContent = 'Upload a new file to switch documents';
    zone.onclick = () => document.getElementById('file-input').click();
    zone.ondragover = onDragOver;
    zone.ondrop = onDrop;

    // Show extraction
    document.getElementById('doc-filename').textContent = data.filename;
    document.getElementById('extraction-content').textContent = data.extraction;
    document.getElementById('extraction-section').classList.remove('hidden');

    // Enable chat and reset history
    S.history = [];
    document.getElementById('messages').innerHTML = '';
    document.getElementById('chat-section').classList.remove('hidden');
    document.getElementById('msg-input').disabled = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('msg-input').focus();

  } catch (err) {
    status.innerHTML = `<span class="error-banner">❌ Network error: ${esc(err.message)}</span>`;
  }
}

// ─── Chat ─────────────────────────────────────────────────────────────────────
async function sendMessage() {
  const input   = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  const message = input.value.trim();
  if (!message) return;

  input.value = '';
  input.disabled = true;
  sendBtn.disabled = true;

  appendMessage('user', message, []);
  const thinking = appendThinking();

  try {
    const res  = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, history: S.history }),
    });
    const data = await res.json();
    thinking.remove();

    if (!res.ok) {
      appendError(data.detail || 'Agent error.');
    } else {
      appendMessage('assistant', data.answer, data.tool_calls || []);
      S.history.push({ role: 'user',      content: message });
      S.history.push({ role: 'assistant', content: data.answer });
    }
  } catch (err) {
    thinking.remove();
    appendError(`Network error: ${err.message}`);
  }

  input.disabled = false;
  sendBtn.disabled = false;
  input.focus();
}

// ─── Render helpers ───────────────────────────────────────────────────────────
function appendMessage(role, content, toolCalls) {
  const wrap = document.getElementById('messages');
  const row  = document.createElement('div');
  row.className = `msg-row ${role}`;

  const lbl = document.createElement('div');
  lbl.className = 'msg-role';
  lbl.textContent = role === 'user' ? 'You' : 'Assistant';
  row.appendChild(lbl);

  // Tool chips (assistant only, shown above the answer)
  if (role === 'assistant' && toolCalls.length > 0) {
    const chips = document.createElement('div');
    chips.className = 'tool-chips';
    toolCalls.forEach(tc => chips.appendChild(makeChip(tc)));
    row.appendChild(chips);
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = content;
  row.appendChild(bubble);

  wrap.appendChild(row);
  row.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return row;
}

function makeChip(tc) {
  const chip = document.createElement('div');
  chip.className = 'tool-chip';

  // Build a short "args" string for the summary line
  const argsStr = Object.entries(tc.input)
    .map(([k, v]) => `${k}=${typeof v === 'number' ? v : JSON.stringify(v)}`)
    .join(', ');

  // Pick the most useful single value from the result for the summary
  const r = tc.result;
  const preview = r.total       !== undefined ? `total=${r.total}`
                : r.fecha_limite              ? r.fecha_limite
                : r.nombre                   ? r.nombre
                : r.error                    ? `error: ${r.error}`
                : JSON.stringify(r).slice(0, 50);

  // Summary line
  const summary = document.createElement('div');
  summary.className = 'chip-summary';
  summary.innerHTML =
    `<span>🔧</span>` +
    `<span class="chip-name">${esc(tc.name)}</span>` +
    `<span class="chip-args">(${esc(argsStr)})</span>` +
    `<span class="chip-arrow">→</span>` +
    `<span class="chip-result">${esc(preview)}</span>` +
    `<span class="chip-toggle">▼ details</span>`;
  chip.appendChild(summary);

  // Expandable details
  const details = document.createElement('div');
  details.className = 'chip-details';
  details.innerHTML =
    `<div class="detail-row"><span class="detail-label">Input:</span>` +
    `<span class="detail-val">${esc(JSON.stringify(tc.input, null, 2))}</span></div>` +
    `<div class="detail-row"><span class="detail-label">Result:</span>` +
    `<span class="detail-val">${esc(JSON.stringify(tc.result, null, 2))}</span></div>`;
  chip.appendChild(details);

  chip.addEventListener('click', () => {
    chip.classList.toggle('open');
    summary.querySelector('.chip-toggle').textContent =
      chip.classList.contains('open') ? '▲ close' : '▼ details';
  });

  return chip;
}

function appendThinking() {
  const wrap = document.getElementById('messages');
  const el   = document.createElement('div');
  el.className = 'thinking';
  el.innerHTML = `<span>Agent thinking</span><span class="dots"><span></span><span></span><span></span></span>`;
  wrap.appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return el;
}

function appendError(msg) {
  const wrap = document.getElementById('messages');
  const el   = document.createElement('div');
  el.className = 'error-banner';
  el.textContent = '⚠ ' + msg;
  wrap.appendChild(el);
}

// ─── Utility ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
</body>
</html>
